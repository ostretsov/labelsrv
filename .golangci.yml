version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - asciicheck
    - bodyclose
    - errorlint
    - gocritic
    - ineffassign
    - unconvert
    - wsl_v5
    - testifylint
    - gosec
    - wrapcheck
    - prealloc
    - modernize
    - gocognit
