name: demo

size:
  width: 4in
  height: 6in

inputs:
  barcode:
    type: string
    required: true
    description: Barcode value to encode

  delivery_address:
    type: string
    required: true
    description: Delivery address (name + address lines)

  label_creation_datetime:
    type: string
    required: true
    description: Label creation date and time (e.g. "2024-06-01 14:30:36")

  # line 1
  line1_description:
    type: string
    required: true
    description: Quantity and item description (e.g. "2x Widget A")

  line1_weight_kg:
    type: string
    required: true
    description: Weight in kg for line 1 (e.g. "1.5")

  line1_value_usd:
    type: string
    required: true
    description: Declared value in USD for line 1 (e.g. "100.00 USD")

  line1_hs_code:
    type: string
    required: true
    description: HS code for line 1 (e.g. "123456")

  # line 2
  line2_description:
    type: string
    required: false
    description: Quantity and item description for line 2 (e.g. "1x Widget B")

  line2_weight_kg:
    type: string
    required: false
    description: Weight in kg for line 2 (e.g. "0.5")

  line2_value_usd:
    type: string
    required: false
    description: Declared value in USD for line 2 (e.g. "50.00 USD")

  line2_hs_code:
    type: string
    required: false
    description: HS code for line 2 (e.g. "654321")

  # line 3
  line3_description:
    type: string
    required: false
    description: Quantity and item description for line 3 (e.g. "3x Widget C")

  line3_weight_kg:
    type: string
    required: false
    description: Weight in kg for line 3 (e.g. "2.0")

  line3_value_usd:
    type: string
    required: false
    description: Declared value in USD for line 3 (e.g. "150.00 USD")

  line3_hs_code:
    type: string
    required: false
    description: HS code for line 3 (e.g. "789012")

  # line 4
  line4_description:
    type: string
    required: false
    description: Quantity and item description for line 4 (e.g. "1x Widget D")

  line4_weight_kg:
    type: string
    required: false
    description: Weight in kg for line 4 (e.g. "0.8")

  line4_value_usd:
    type: string
    required: false
    description: Declared value in USD for line 4 (e.g. "80.00 USD")

  line4_hs_code:
    type: string
    required: false
    description: HS code for line 4 (e.g. "345678")

  # line 5
  line5_description:
    type: string
    required: false
    description: Quantity and item description for line 5 (e.g. "5x Widget E")

  line5_weight_kg:
    type: string
    required: false
    description: Weight in kg for line 5 (e.g. "3.0")

  line5_value_usd:
    type: string
    required: false
    description: Declared value in USD for line 5 (e.g. "200.00 USD")

  line5_hs_code:
    type: string
    required: false
    description: HS code for line 5 (e.g. "901234")

  # total
  total_weight_kg:
    type: string
    required: true
    description: Total weight in kg (e.g. "1.5")

  total_value_usd:
    type: string
    required: true
    description: Total declared value in USD (e.g. "100.00 USD")

layout:
  - id: header_barcode_text
    type: text
    value: "Custom Label Demo"
    x: 8
    y: 2.5
    font_size: 8

  - id: header_barcode
    type: barcode
    source: input
    key: barcode
    barcode_type: code128
    x: 6
    y: 6
    width: 90
    height: 10

  - id: header_barcode_value
    type: textbox
    source: input
    key: barcode
    x: 3
    y: 17
    width: 96
    height: 4
    font_size: 9
    #    border_color: "#000000"
    align: "C"

  # Destination
  - id: dst_to_rect
    type: rect
    x: 3
    y: 22
    width: 96
    height: 4
    line_width: 0.2
    color: "#000000"

  - id: dst_to_text
    type: text
    value: "To Some Country"
    x: 4
    y: 22.5
    font_size: 8

  - id: dst_addr_rect
